<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINEL PREMIUM V2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Monoton&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #000411, #0a0a1a);
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      color: #fff;
      position: relative;
    }

    #particles-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
    }

    /* Login */
    .login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,4,17,0.95); backdrop-filter: blur(10px);
      display: flex; justify-content: center; align-items: center; z-index: 20;
      opacity: 1; transition: opacity 0.6s ease;
    }

    .login-overlay.hidden { opacity: 0; pointer-events: none; }

    .login-panel {
      width: 90%; max-width: 420px; padding: 45px 35px;
      background: rgba(10,10,30,0.4); backdrop-filter: blur(30px);
      border: 2px solid rgba(255,0,64,0.6); border-radius: 25px;
      box-shadow: 0 0 70px rgba(255,0,64,0.4); text-align: center;
      animation: glow 2.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 70px rgba(255,0,64,0.4); }
      to { box-shadow: 0 0 110px rgba(255,0,64,0.7); }
    }

    .title { 
      font-family: 'Monoton', cursive; font-size: clamp(2.5rem, 6.5vw, 4.2rem);
      background: linear-gradient(45deg, #ff0040, #ff1744, #ff496c); 
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px; text-shadow: 0 0 30px rgba(255,0,64,0.6); font-weight: 900;
    }

    .subtitle { 
      font-size: clamp(1rem, 2.5vw, 1.2rem); color: #ff496c; margin-bottom: 45px; 
      letter-spacing: 3px; text-transform: uppercase;
    }

    .password-container { position: relative; margin-bottom: 35px; }

    #password {
      width: 100%; padding: 20px 60px 20px 25px; background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,0,64,0.5); border-radius: 18px; font-size: 1.2rem; color: #fff;
      transition: all 0.4s; backdrop-filter: blur(15px); font-family: 'Orbitron', monospace;
    }

    #password:focus {
      outline: none; border-color: #ff0040; box-shadow: 0 0 30px rgba(255,0,64,0.6); transform: scale(1.04);
    }

    #password::placeholder { color: #999; }

    .eye-icon {
      position: absolute; right: 22px; top: 50%; transform: translateY(-50%); cursor: pointer;
      font-size: 1.5rem; color: #ff1744; transition: all 0.4s;
    }

    .eye-icon:hover { color: #fff; transform: translateY(-50%) scale(1.3); }

    .enter-btn {
      width: 100%; padding: 22px; background: linear-gradient(45deg, #ff0040, #ff1744, #ff496c);
      border: none; border-radius: 18px; font-size: 1.45rem; font-weight: 800; color: #fff; cursor: pointer;
      text-transform: uppercase; letter-spacing: 2px; transition: all 0.4s;
      box-shadow: 0 0 40px rgba(255,0,64,0.6); font-family: 'Orbitron', monospace;
    }

    .enter-btn:hover {
      transform: translateY(-5px) scale(1.1); box-shadow: 0 20px 60px rgba(255,0,64,0.8);
    }

    /* Aimbot Panel */
    .main-panel {
      display: flex; justify-content: center; align-items: center; height: 100vh;
      opacity: 0; transition: opacity 0.6s; z-index: 10;
    }

    .main-panel.visible { opacity: 1; }

    .card {
      width: 95%; max-width: 380px; border-radius: 30px; padding: 35px;
      background: linear-gradient(180deg, rgba(10,20,45,0.9), rgba(5,10,25,0.95));
      backdrop-filter: blur(25px); border: 2px solid rgba(255,0,64,0.6);
      box-shadow: 0 0 50px rgba(255,0,64,0.4); animation: cardGlow 3.5s ease-in-out infinite alternate;
    }

    @keyframes cardGlow {
      from { box-shadow: 0 0 50px rgba(255,0,64,0.4); }
      to { box-shadow: 0 0 80px rgba(255,0,64,0.7); }
    }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }

    .title-aimbot {
      font-size: 1.8rem; font-weight: 900;
      background: linear-gradient(45deg, #ff0040, #ff496c); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px;
    }

    .subtitle-aimbot {
      font-size: 1rem; color: #ff496c; margin-bottom: 30px; letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .item {
      display: flex; justify-content: space-between; align-items: center;
      margin: 20px 0; padding: 18px; border-radius: 18px; background: rgba(255,0,64,0.15);
      border: 1px solid rgba(255,0,64,0.3); transition: all 0.4s; backdrop-filter: blur(12px);
    }

    .item:hover {
      transform: translateX(8px) scale(1.02); box-shadow: 0 8px 30px rgba(255,0,64,0.4);
      border-color: rgba(255,0,64,0.7);
    }

    .switch { position: relative; width: 55px; height: 28px; }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute; cursor: pointer; background: rgba(255,255,255,0.12);
      border-radius: 28px; top: 0; left: 0; right: 0; bottom: 0; transition: 0.4s;
      border: 1px solid rgba(255,0,64,0.4);
    }

    .slider:before {
      position: absolute; content: ""; height: 24px; width: 24px; left: 2px; bottom: 2px;
      background: linear-gradient(45deg, #ff0040, #ff1744); border-radius: 50%; transition: 0.4s;
      box-shadow: 0 0 15px rgba(255,0,64,0.8);
    }

    input:checked + .slider { background: rgba(255,0,64,0.35); border-color: #ff0040; }

    input:checked + .slider:before { transform: translateX(27px); }

    .footer {
      text-align: center; margin-top: 30px; font-size: 0.9rem; color: #888; letter-spacing: 1px;
    }

    .brand { color: #ff496c; font-weight: 700; }

    .close {
      cursor: pointer; color: #ff496c; font-size: 1.6rem; transition: all 0.3s;
    }

    .close:hover { color: #ff0040; transform: scale(1.3); }

    @media (max-width: 480px) { .login-panel, .card { padding: 30px 25px; margin: 15px; } }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <div class="login-overlay" id="loginOverlay">
    <div class="login-panel">
      <h1 class="title">PAINEL PREMIUM V2.0</h1>
      <p class="subtitle">Acesso Restrito</p>
      <div class="password-container">
        <input type="password" id="password" placeholder="Digite a senha..." autocomplete="off">
        <span class="eye-icon" id="eyeIcon">👁️</span>
      </div>
      <button class="enter-btn" onclick="login()">ENTRAR</button>
    </div>
  </div>

  <div class="main-panel" id="mainPanel">
    <div class="card">
      <div class="header">
        <span>⚙️</span>
        <span class="close" onclick="closePanel()">✖</span>
      </div>
      <div class="title-aimbot">AIMBOT</div>
      <div class="subtitle-aimbot">Configurações de mira e precisão</div>

      <div class="item">
        Legit
        <label class="switch">
          <input type="checkbox" id="legitToggle" onchange="toggleLegit(this.checked)">
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        Anti Shake
        <label class="switch">
          <input type="checkbox" id="antishakeToggle" onchange="toggleAntiShake(this.checked)">
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        Retirar Input Lag
        <label class="switch">
          <input type="checkbox" id="inputlagToggle" onchange="toggleInputLag(this.checked)">
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        Diminuir Recuo
        <label class="switch">
          <input type="checkbox" id="recoToggle" onchange="toggleRecuo(this.checked)">
          <span class="slider"></span>
        </label>
      </div>

      <div class="footer">
        Todos os direitos reservados<br>
        <span class="brand">@chpias</span>
      </div>
    </div>
  </div>

  <script>
    // Particles
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    addEventListener('resize', resize); resize();

    class Particle {
      constructor() {
        this.x = Math.random() * innerWidth;
        this.y = Math.random() * innerHeight;
        this.size = Math.random() * 3 + 1;
        this.vx = Math.random() * 0.5 - 0.25;
        this.vy = Math.random() * 0.5 - 0.25;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > innerWidth) this.vx *= -1;
        if (this.y < 0 || this.y > innerHeight) this.vy *= -1;
      }
      draw() {
        ctx.fillStyle = 'rgba(255,0,64,0.75)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
      }
    }

    function initParticles() { particles = Array.from({length:150}, () => new Particle()); }
    initParticles();

    function connect() {
      for (let i = 0; i < particles.length; i++) for (let j = i+1; j < particles.length; j++) {
        const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
        if (dist < 130) {
          ctx.strokeStyle = `rgba(255,0,64,${(1 - dist/130)*0.7})`; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
        }
      }
    }

    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      connect(); requestAnimationFrame(animate);
    } animate();

    // Login
    const overlay = document.getElementById('loginOverlay');
    const panel = document.getElementById('mainPanel');
    const pwd = document.getElementById('password');
    const eye = document.getElementById('eyeIcon');

    eye.onclick = () => {
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      eye.textContent = pwd.type === 'password' ? '👁️' : '🙈';
    };

    pwd.onkeypress = e => e.key === 'Enter' && login();

    function login() {
      if (pwd.value === 'admin123') {
        overlay.classList.add('hidden');
        panel.classList.add('visible');
        pwd.value = '';
      } else {
        alert('Senha errada!');
        pwd.value = '';
      }
    }

    // Toggle Functions (original preserved)
    function toggleLegit(active) { console.log('Legit ' + (active ? 'ON' : 'OFF')); /* Legit.js */ }
    function toggleAntiShake(active) { console.log('Anti-Shake ' + (active ? 'ON' : 'OFF')); /* AntiShake.js */ }
    function toggleInputLag(active) { console.log('Input Lag ' + (active ? 'OFF' : 'ON')); }
    function toggleRecuo(active) { console.log('Recuo ' + (active ? 'REDUZIDO' : 'NORMAL')); }

    function closePanel() { document.querySelector('.card').style.display = 'none'; }
  </script>
</body>
</html>
